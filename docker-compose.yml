version: 'python:3.12'

services:
  postgres:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    mem_limit: 1g
    cpus: "1"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=myapp
    healthcheck: 
      test: [ "CMD-SHELL","pg_isready -U postgres" ]
      timeout: 15s
      retries: 3
      interval: 15s
      start_period: 15s

  web:
    image: tusharm9344/docker-practice:latest
    depends_on: 
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    mem_limit: 512m
    cpus: "0.5"
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      retries: 4
      start_period: 15s
      timeout: 10s
 
  nginx:
    image: nginx:alpine
    depends_on: 
      web:
        condition: service_healthy
    restart:  unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    ports:
      - "80:80"
    mem_limit: 256m
    cpus: "0.25"
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
