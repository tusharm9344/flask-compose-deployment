name: Practice deploying

on:
  push:
    branches: [main]

jobs: 
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: pytest

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.DOCKER_PASSWORD_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-practice:${{ github.sha }} .
      - run: docker tag ${{ secrets.DOCKER_USERNAME }}/docker-practice:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/docker-practice:latest
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/docker-practice:${{ github.sha }}
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/docker-practice:latest

 

